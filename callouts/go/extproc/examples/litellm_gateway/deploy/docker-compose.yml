services:
  callout:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "80:80"
    environment:
      - EXAMPLE_TYPE=litellm_gateway
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_MASTER_KEY=sk-test-master-key
      # Set to "true" to enable CORS headers for browser-based access.
      # - ENABLE_CORS=true
      # Comma-separated keywords to detect in prompts. Adds x-sec-keyword response header.
      - SEC_KEYWORDS=service extensions,litellm,ext_proc,callout
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - llm-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=sk-test-master-key
      - GEMINI_API_KEY=YOUR_API_KEY_HERE
      # Uncomment to enable additional providers:
      # - ANTHROPIC_API_KEY=YOUR_API_KEY_HERE
      # - OPENAI_API_KEY=YOUR_API_KEY_HERE
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge
