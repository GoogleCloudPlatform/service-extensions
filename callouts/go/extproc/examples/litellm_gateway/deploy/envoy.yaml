# Envoy config for local testing of the full LiteLLM Gateway chain.
#
# Simulates what Google Cloud ALB + Traffic Extension do in production:
#   client -> Envoy (this config)
#              -> ext_proc filter -> callout (policy enforcer)
#              -> route -> LiteLLM -> Vertex AI
#
# Start with `docker-compose up --build` from this directory.

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: litellm_vhost
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: litellm
                            timeout: 120s
                http_filters:
                  # ext_proc calls the Go callout for every request.
                  # The callout uses ModeOverride to request buffered bodies
                  # only for LLM endpoints.
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: callout
                        timeout: 10s
                      processing_mode:
                        request_header_mode: SEND
                        request_body_mode: NONE
                        response_header_mode: SKIP
                        response_body_mode: NONE
                      allow_mode_override: true
                      failure_mode_allow: false
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Go callout (gRPC). ext_proc uses HTTP/2 over h2c.
    - name: callout
      connect_timeout: 5s
      type: STRICT_DNS
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: callout
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: callout
                      port_value: 8080

    # LiteLLM proxy (HTTP/1.1).
    - name: litellm
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: litellm
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: litellm
                      port_value: 4000

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
