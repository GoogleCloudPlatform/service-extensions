syntax = "proto3";

package serviceextensions.cdn_token;

// Configuration for the CDN Token Generator plugin.
message CdnTokenConfig {
  // Hex-encoded HMAC key
  string private_key_hex = 1;
  // Media CDN key name
  string key_name = 2;
  // Token validity in seconds (default is used if not provided)
  int32 expiry_seconds = 3;
}
