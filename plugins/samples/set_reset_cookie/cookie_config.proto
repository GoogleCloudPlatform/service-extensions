syntax = "proto3";

package serviceextensions.cookie_manager;

// Cookie operation types.
enum CookieOperation {
  COOKIE_OPERATION_UNSPECIFIED = 0;
  SET = 1;
  DELETE = 2;
  OVERWRITE = 3;
}

// Configuration for a single cookie operation.
message CookieConfig {
  string name = 1;
  string value = 2;
  string domain = 3;
  string path = 4;
  int32 max_age = 5;
  bool secure = 6;
  bool http_only = 7;
  bool same_site_strict = 8;
  CookieOperation operation = 9;
}

// Top-level configuration containing multiple cookie definitions.
message CookieManagerConfig {
  repeated CookieConfig cookies = 1;
}
